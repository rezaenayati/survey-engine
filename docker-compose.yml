version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: survey-engine-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: survey_engine
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  survey-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: survey-engine
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: survey_engine
      CORS_ORIGINS: "*"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
